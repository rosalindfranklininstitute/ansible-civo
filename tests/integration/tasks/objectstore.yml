---
# Object store integration tests: create / read / idempotency / destroy

- name: "[objectstore] Create test object store"
  civo.cloud.objectstore:
    name: "{{ test_prefix }}-bucket"
    region: "{{ region }}"
    max_size_gb: 500
    wait: true
    timeout: 120
    state: present
  register: obs_create
  tags: [objectstore]

- name: "[objectstore] Assert created"
  ansible.builtin.assert:
    that:
      - obs_create.changed
      - obs_create.objectstore.id is defined
    fail_msg: "Object store creation failed: {{ obs_create }}"
  tags: [objectstore]

- name: "[objectstore] READ — info by name"
  civo.cloud.objectstore_info:
    name: "{{ test_prefix }}-bucket"
    region: "{{ region }}"
  register: obs_info
  tags: [objectstore]

- name: "[objectstore] Assert info returned"
  ansible.builtin.assert:
    that:
      - obs_info.objectstores | length == 1
      - obs_info.objectstores[0].name == test_prefix + '-bucket'
    fail_msg: "Object store info failed: {{ obs_info }}"
  tags: [objectstore]

- name: "[objectstore] Idempotency"
  civo.cloud.objectstore:
    name: "{{ test_prefix }}-bucket"
    region: "{{ region }}"
    max_size_gb: 500
    wait: true
    state: present
  register: obs_idem
  tags: [objectstore]

- name: "[objectstore] Assert idempotent"
  ansible.builtin.assert:
    that:
      - not obs_idem.changed
    fail_msg: "Object store create is not idempotent: {{ obs_idem }}"
  tags: [objectstore]

# =========================================================================
# purge_credentials: verify auto-created credential is deleted with the store
# =========================================================================
- name: "[objectstore] purge_credentials test — create ephemeral store"
  civo.cloud.objectstore:
    name: "{{ test_prefix }}-store"
    region: "{{ region }}"
    max_size_gb: 500
    wait: true
    timeout: 120
    state: present
  register: obs_purge_create
  tags: [objectstore]

- name: "[objectstore] purge_credentials test — capture credential count before delete"
  civo.cloud.objectstore_info:
    region: "{{ region }}"
  register: creds_before
  tags: [objectstore]

- name: "[objectstore] purge_credentials test — delete store with purge_credentials=true"
  civo.cloud.objectstore:
    name: "{{ test_prefix }}-store"
    region: "{{ region }}"
    state: absent
    purge_credentials: true
  register: obs_purge_delete
  tags: [objectstore]

- name: "[objectstore] purge_credentials test — assert store deleted and credential mentioned"
  ansible.builtin.assert:
    that:
      - obs_purge_delete.changed
      - "'purged' in obs_purge_delete.msg or 'deleted' in obs_purge_delete.msg"
    fail_msg: "Expected store deletion with credential purge: {{ obs_purge_delete }}"
  tags: [objectstore]

- name: "[objectstore] purge_credentials test — absent again is idempotent"
  civo.cloud.objectstore:
    name: "{{ test_prefix }}-store"
    region: "{{ region }}"
    state: absent
    purge_credentials: true
  register: obs_purge_idem
  tags: [objectstore]

- name: "[objectstore] purge_credentials test — assert no change on absent→absent"
  ansible.builtin.assert:
    that:
      - not obs_purge_idem.changed
    fail_msg: "Expected no change deleting non-existent store: {{ obs_purge_idem }}"
  tags: [objectstore]
