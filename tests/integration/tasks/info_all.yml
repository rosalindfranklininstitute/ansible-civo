---
# List-all (no name filter) smoke tests for every _info module

- name: "[network_info] List all networks"
  civo.cloud.network_info:
    region: "{{ region }}"
  register: all_nets
  tags: [info]

- name: "[network_info] Assert test network in list"
  ansible.builtin.assert:
    that:
      - all_nets.networks | selectattr('label', 'equalto', test_prefix + '-network') | list | length == 1
  tags: [info]

