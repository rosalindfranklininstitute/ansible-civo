---
# Network integration tests: create / read / idempotency / destroy

- name: "[network] Create test network"
  civo.cloud.network:
    name: "{{ test_prefix }}-network"
    region: "{{ region }}"
    state: present
  register: net_create
  tags: [network]

- name: "[network] Assert created"
  ansible.builtin.assert:
    that:
      - net_create.changed
      - net_create.network.id is defined
      - net_create.network.id | length > 0
    fail_msg: "Network creation failed: {{ net_create }}"
  tags: [network]

- name: "[network] READ — info by name"
  civo.cloud.network_info:
    name: "{{ test_prefix }}-network"
    region: "{{ region }}"
  register: net_info
  tags: [network]

- name: "[network] Assert info returned"
  ansible.builtin.assert:
    that:
      - net_info.networks | length == 1
      - net_info.networks[0].id == net_create.network.id
    fail_msg: "Network info failed: {{ net_info }}"
  tags: [network]

- name: "[network] Idempotency — present again"
  civo.cloud.network:
    name: "{{ test_prefix }}-network"
    region: "{{ region }}"
    state: present
  register: net_idem
  tags: [network]

- name: "[network] Assert idempotent"
  ansible.builtin.assert:
    that:
      - not net_idem.changed
    fail_msg: "Network create is not idempotent: {{ net_idem }}"
  tags: [network]

- name: "[network] Wait for network to become Active"
  civo.cloud.network_info:
    name: "{{ test_prefix }}-network"
    region: "{{ region }}"
  register: net_wait
  until: net_wait.networks | length > 0 and net_wait.networks[0].status == 'Active'
  retries: 20
  delay: 10
  tags: [network]

# =========================================================================
# CIDR parameter (covers the cidr branch in civo_network)
# =========================================================================
- name: "[network] Create second network with explicit CIDR"
  civo.cloud.network:
    name: "{{ test_prefix }}-network-cidr"
    region: "{{ region }}"
    cidr: "172.16.100.0/24"
    state: present
  register: net_cidr
  tags: [network]

- name: "[network] Assert cidr network created"
  ansible.builtin.assert:
    that:
      - net_cidr.changed
      - net_cidr.network.id is defined
    fail_msg: "Network with CIDR creation failed: {{ net_cidr }}"
  tags: [network]

- name: "[network] Delete cidr network"
  civo.cloud.network:
    name: "{{ test_prefix }}-network-cidr"
    region: "{{ region }}"
    state: absent
  register: net_cidr_delete
  tags: [network]

- name: "[network] Assert cidr network deleted"
  ansible.builtin.assert:
    that:
      - net_cidr_delete.changed
    fail_msg: "Network with CIDR deletion failed: {{ net_cidr_delete }}"
  tags: [network]

# =========================================================================
# ABSENT idempotency (not-found path)
# =========================================================================
- name: "[network] Absent idempotency — network does not exist"
  civo.cloud.network:
    name: "{{ test_prefix }}-network-cidr"
    region: "{{ region }}"
    state: absent
  register: net_absent_idem
  tags: [network]

- name: "[network] Assert absent is idempotent when not found"
  ansible.builtin.assert:
    that:
      - not net_absent_idem.changed
    fail_msg: "Absent should be idempotent when network not found: {{ net_absent_idem }}"
  tags: [network]
