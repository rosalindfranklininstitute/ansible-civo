---
# Volume attach to instance

- name: "[volume] Wait for volume to be available after resize"
  civo.cloud.civo_volume_info:
    name: "{{ test_prefix }}-vol"
    region: "{{ region }}"
  register: vol_pre_attach
  until: vol_pre_attach.volumes | length > 0 and vol_pre_attach.volumes[0].status == 'available'
  retries: 40
  delay: 15
  tags: [volume]

- name: "[volume] Attach to instance"
  civo.cloud.civo_volume:
    name: "{{ test_prefix }}-vol"
    region: "{{ region }}"
    instance: "{{ test_prefix }}-vm"
    state: attached
  register: vol_attach
  tags: [volume]

- name: "[volume] Assert attach changed"
  ansible.builtin.assert:
    that:
      - vol_attach.changed
    fail_msg: "Volume attach failed: {{ vol_attach }}"
  tags: [volume]

- name: "[volume] Idempotency of attach (by name)"
  civo.cloud.civo_volume:
    name: "{{ test_prefix }}-vol"
    region: "{{ region }}"
    instance: "{{ test_prefix }}-vm"
    state: attached
  register: vol_attach_idem
  tags: [volume]

- name: "[volume] Assert attach idempotent (by name)"
  ansible.builtin.assert:
    that:
      - not vol_attach_idem.changed
    fail_msg: "Volume attach is not idempotent: {{ vol_attach_idem }}"
  tags: [volume]

# Re-attach using the instance UUID — exercises the is_uuid() branch of the
# attachment idempotency check.  The Civo CLI stores hostname (not UUID) in
# instance_id, so we must look up the UUID via civo_instance_info.
- name: "[volume] Look up instance UUID for UUID-based idempotency test"
  civo.cloud.civo_instance_info:
    hostname: "{{ test_prefix }}-vm"
    region: "{{ region }}"
  register: inst_uuid_lookup
  tags: [volume]

- name: "[volume] Idempotency of attach (by UUID)"
  civo.cloud.civo_volume:
    name: "{{ test_prefix }}-vol"
    region: "{{ region }}"
    instance: "{{ inst_uuid_lookup.instances[0].id }}"
    state: attached
  register: vol_attach_uuid
  tags: [volume]

- name: "[volume] Assert attach idempotent by UUID"
  ansible.builtin.assert:
    that:
      - not vol_attach_uuid.changed
    fail_msg: "Volume attach by UUID is not idempotent: {{ vol_attach_uuid }}"
  tags: [volume]
