---
# Integration tests for catalog info modules: diskimage and kubernetes version.
# These tests only read data from the Civo API — no resources are created.
# Tags: [catalog]

# =========================================================================
# DISK IMAGE INFO
# =========================================================================
- name: "[diskimage_info] List all disk images"
  civo.cloud.civo_diskimage_info:
    region: "{{ region }}"
  register: all_images
  tags: [catalog, diskimage_info]

- name: "[diskimage_info] Assert non-empty list returned"
  ansible.builtin.assert:
    that:
      - all_images.diskimages is defined
      - all_images.diskimages | length > 0
      - all_images.diskimages[0].id is defined
      - all_images.diskimages[0].name is defined
    fail_msg: "Expected non-empty diskimage list: {{ all_images }}"
  tags: [catalog, diskimage_info]

- name: "[diskimage_info] Filter by name (debian-11)"
  civo.cloud.civo_diskimage_info:
    region: "{{ region }}"
    name: debian-11
  register: debian11
  tags: [catalog, diskimage_info]

- name: "[diskimage_info] Assert exactly one result for debian-11"
  ansible.builtin.assert:
    that:
      - debian11.diskimages | length == 1
      - debian11.diskimages[0].name == "debian-11"
      - debian11.diskimages[0].distribution == "debian"
    fail_msg: "Expected exactly one debian-11 image: {{ debian11 }}"
  tags: [catalog, diskimage_info]

- name: "[diskimage_info] Filter by non-existent name"
  civo.cloud.civo_diskimage_info:
    region: "{{ region }}"
    name: "does-not-exist-image-xyz"
  register: no_image
  tags: [catalog, diskimage_info]

- name: "[diskimage_info] Assert empty list for non-existent name"
  ansible.builtin.assert:
    that:
      - no_image.diskimages | length == 0
    fail_msg: "Expected empty list for non-existent image: {{ no_image }}"
  tags: [catalog, diskimage_info]

- name: "[diskimage_info] Filter by distribution (ubuntu)"
  civo.cloud.civo_diskimage_info:
    region: "{{ region }}"
    distribution: ubuntu
  register: ubuntu_images
  tags: [catalog, diskimage_info]

- name: "[diskimage_info] Assert ubuntu images all have distribution=ubuntu"
  ansible.builtin.assert:
    that:
      - ubuntu_images.diskimages | length > 0
      - ubuntu_images.diskimages | map(attribute='distribution') | select('ne', 'ubuntu') | list | length == 0
    fail_msg: "Expected only ubuntu images: {{ ubuntu_images.diskimages | map(attribute='distribution') | list }}"
  tags: [catalog, diskimage_info]

# =========================================================================
# KUBERNETES VERSION INFO
# =========================================================================
- name: "[k8s_version_info] List all Kubernetes versions"
  civo.cloud.civo_kubernetes_version_info:
    region: "{{ region }}"
  register: all_k8s_versions
  tags: [catalog, kubernetes_version_info]

- name: "[k8s_version_info] Assert non-empty list with required fields"
  ansible.builtin.assert:
    that:
      - all_k8s_versions.kubernetes_versions is defined
      - all_k8s_versions.kubernetes_versions | length > 0
      - all_k8s_versions.kubernetes_versions[0].version is defined
      - all_k8s_versions.kubernetes_versions[0].type is defined
    fail_msg: "Expected non-empty kubernetes versions list: {{ all_k8s_versions }}"
  tags: [catalog, kubernetes_version_info]

- name: "[k8s_version_info] Exactly one default version per cluster_type"
  ansible.builtin.assert:
    that:
      - all_k8s_versions.kubernetes_versions | selectattr('default', 'equalto', 'true') | list | length >= 1
    fail_msg: >-
      Expected at least one default version, got:
      {{ all_k8s_versions.kubernetes_versions | selectattr('default', 'equalto', 'true') | map(attribute='version') | list }}
  tags: [catalog, kubernetes_version_info]

- name: "[k8s_version_info] Filter to stable versions only"
  civo.cloud.civo_kubernetes_version_info:
    region: "{{ region }}"
    maturity: stable
  register: stable_k8s_versions
  tags: [catalog, kubernetes_version_info]

- name: "[k8s_version_info] Assert all returned versions are stable"
  ansible.builtin.assert:
    that:
      - stable_k8s_versions.kubernetes_versions | length > 0
      - stable_k8s_versions.kubernetes_versions | map(attribute='type') | select('ne', 'stable') | list | length == 0
    fail_msg: "Expected only stable versions: {{ stable_k8s_versions.kubernetes_versions | map(attribute='type') | list }}"
  tags: [catalog, kubernetes_version_info]

- name: "[k8s_version_info] Filter to deprecated versions"
  civo.cloud.civo_kubernetes_version_info:
    region: "{{ region }}"
    maturity: deprecated
  register: deprecated_k8s_versions
  tags: [catalog, kubernetes_version_info]

- name: "[k8s_version_info] Assert deprecated versions returned (Civo always has some)"
  ansible.builtin.assert:
    that:
      - deprecated_k8s_versions.kubernetes_versions | length > 0
    fail_msg: "Expected at least one deprecated version: {{ deprecated_k8s_versions }}"
  tags: [catalog, kubernetes_version_info]

- name: "[k8s_version_info] Stable + deprecated + development should equal total"
  tags: [catalog, kubernetes_version_info]
  block:
    - name: "[k8s_version_info] Get development versions"
      civo.cloud.civo_kubernetes_version_info:
        region: "{{ region }}"
        maturity: development
      register: dev_k8s_versions

    - name: "[k8s_version_info] Assert total adds up"
      ansible.builtin.assert:
        that:
          - (stable_k8s_versions.kubernetes_versions | length
             + deprecated_k8s_versions.kubernetes_versions | length
             + dev_k8s_versions.kubernetes_versions | length)
            == all_k8s_versions.kubernetes_versions | length
        fail_msg: >-
          Version counts don't add up:
          stable={{ stable_k8s_versions.kubernetes_versions | length }},
          deprecated={{ deprecated_k8s_versions.kubernetes_versions | length }},
          development={{ dev_k8s_versions.kubernetes_versions | length }},
          total={{ all_k8s_versions.kubernetes_versions | length }}

# =========================================================================
# REGION INFO
# =========================================================================
- name: "[region_info] List all regions"
  civo.cloud.civo_region_info:
    region: "{{ region }}"
  register: all_regions
  tags: [catalog, region_info]

- name: "[region_info] Assert non-empty list with required fields"
  ansible.builtin.assert:
    that:
      - all_regions.regions is defined
      - all_regions.regions | length > 0
      - all_regions.regions[0].code is defined
      - all_regions.regions[0].country is defined
    fail_msg: "Expected non-empty regions list: {{ all_regions }}"
  tags: [catalog, region_info]

- name: "[region_info] Assert exactly one current region"
  ansible.builtin.assert:
    that:
      - all_regions.regions | selectattr('current', 'equalto', 'Yes') | list | length == 1
    fail_msg: >-
      Expected exactly one current region:
      {{ all_regions.regions | map(attribute='code') | list }}
  tags: [catalog, region_info]

# =========================================================================
# SIZE INFO
# =========================================================================
- name: "[size_info] List all sizes"
  civo.cloud.civo_size_info:
    region: "{{ region }}"
  register: all_sizes
  tags: [catalog, size_info]

- name: "[size_info] Assert non-empty list with required fields"
  ansible.builtin.assert:
    that:
      - all_sizes.sizes is defined
      - all_sizes.sizes | length > 0
      - all_sizes.sizes[0].name is defined
      - all_sizes.sizes[0].type is defined
    fail_msg: "Expected non-empty sizes list: {{ all_sizes }}"
  tags: [catalog, size_info]

- name: "[size_info] Filter to instance sizes"
  civo.cloud.civo_size_info:
    region: "{{ region }}"
    resource_type: instance
  register: instance_sizes
  tags: [catalog, size_info]

- name: "[size_info] Assert all returned types are Instance"
  ansible.builtin.assert:
    that:
      - instance_sizes.sizes | length > 0
      - instance_sizes.sizes | map(attribute='type') | select('ne', 'Instance') | list | length == 0
    fail_msg: "Expected only Instance sizes: {{ instance_sizes.sizes | map(attribute='type') | list }}"
  tags: [catalog, size_info]

- name: "[size_info] Filter to kubernetes sizes"
  civo.cloud.civo_size_info:
    region: "{{ region }}"
    resource_type: kubernetes
  register: k8s_sizes
  tags: [catalog, size_info]

- name: "[size_info] Assert all returned types are Kubernetes"
  ansible.builtin.assert:
    that:
      - k8s_sizes.sizes | length > 0
      - k8s_sizes.sizes | map(attribute='type') | select('ne', 'Kubernetes') | list | length == 0
    fail_msg: "Expected only Kubernetes sizes: {{ k8s_sizes.sizes | map(attribute='type') | list }}"
  tags: [catalog, size_info]

- name: "[size_info] Filter to database sizes"
  civo.cloud.civo_size_info:
    region: "{{ region }}"
    resource_type: database
  register: db_sizes
  tags: [catalog, size_info]

- name: "[size_info] Assert all returned types are Database"
  ansible.builtin.assert:
    that:
      - db_sizes.sizes | length > 0
      - db_sizes.sizes | map(attribute='type') | select('ne', 'Database') | list | length == 0
    fail_msg: "Expected only Database sizes: {{ db_sizes.sizes | map(attribute='type') | list }}"
  tags: [catalog, size_info]

- name: "[size_info] Assert instance+kubernetes+database equals total"
  ansible.builtin.assert:
    that:
      - (instance_sizes.sizes | length
         + k8s_sizes.sizes | length
         + db_sizes.sizes | length)
        == all_sizes.sizes | length
    fail_msg: >-
      Size counts don't add up:
      instance={{ instance_sizes.sizes | length }},
      kubernetes={{ k8s_sizes.sizes | length }},
      database={{ db_sizes.sizes | length }},
      total={{ all_sizes.sizes | length }}
  tags: [catalog, size_info]

# =========================================================================
# QUOTA INFO
# =========================================================================
- name: "[quota_info] Get account quota"
  civo.cloud.civo_quota_info:
    region: "{{ region }}"
  register: quota
  tags: [catalog, quota_info]

- name: "[quota_info] Assert required quota fields present"
  ansible.builtin.assert:
    that:
      - quota.quota is defined
      - quota.quota.instance_count_limit is defined
      - quota.quota.instance_count_usage is defined
      - quota.quota.cpu_core_limit is defined
      - quota.quota.network_count_limit is defined
    fail_msg: "Expected quota dict with limit/usage fields: {{ quota }}"
  tags: [catalog, quota_info]

- name: "[quota_info] Assert usage does not exceed limit for instances"
  ansible.builtin.assert:
    that:
      - quota.quota.instance_count_usage | int <= quota.quota.instance_count_limit | int
    fail_msg: >-
      Instance usage {{ quota.quota.instance_count_usage }}
      exceeds limit {{ quota.quota.instance_count_limit }}
  tags: [catalog, quota_info]

# =========================================================================
# VOLUME TYPE INFO
# =========================================================================
- name: "[volumetype_info] List all volume types"
  civo.cloud.civo_volumetype_info:
    region: "{{ region }}"
  register: vtypes
  tags: [catalog, volumetype_info]

- name: "[volumetype_info] Assert non-empty list with required fields"
  ansible.builtin.assert:
    that:
      - vtypes.volume_types is defined
      - vtypes.volume_types | length > 0
      - vtypes.volume_types[0].name is defined
    fail_msg: "Expected non-empty volume_types list: {{ vtypes }}"
  tags: [catalog, volumetype_info]
