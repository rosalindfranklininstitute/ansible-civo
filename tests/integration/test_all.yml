---
# Integration test suite for civo.cloud collection
# Tests CREATE / READ (_info) / UPDATE / DELETE for all supported resource types.
#
# Prerequisites:
#   - CIVO_TOKEN env var set
#   - civo CLI installed and configured
#   - Collection installed at ~/.ansible/collections/ansible_collections/civo/cloud
#
# Run all tests:
#   ansible-playbook tests/integration/test_all.yml -v
#
# Run a subset by tag:
#   ansible-playbook tests/integration/test_all.yml -v --tags kubernetes
#   ansible-playbook tests/integration/test_all.yml -v --tags kubernetes_upgrade
#   ansible-playbook tests/integration/test_all.yml -v --tags kubernetes_node
#   ansible-playbook tests/integration/test_all.yml -v --tags kubernetes_pool
#
# Resources are named with "ansible-test-" prefix for easy identification.
# The final always: block in each include guarantees cleanup even on failure.

- name: Civo.cloud integration tests
  hosts: localhost
  gather_facts: false
  vars:
    region: LON1
    test_prefix: "ansible-test"
    # Cheapest selectable sizes
    instance_size: g3.xsmall        # 1 CPU, 1 GB RAM, 25 GB disk
    k8s_node_size: g4s.kube.xsmall  # 1 CPU, 1 GB RAM
    db_size: g3.db.small            # g3.db.xsmall is not selectable
    db_engine: postgresql
    db_version: "17"

  tasks:

    - name: Run all tests
      block:

        - name: Include network tests
          ansible.builtin.include_tasks:
            file: tasks/network.yml
            apply:
              tags: [network]
          tags: [always, network]

        - name: Include firewall tests
          ansible.builtin.include_tasks:
            file: tasks/firewall.yml
            apply:
              tags: [firewall]
          tags: [always, firewall]

        - name: Include reserved IP tests
          ansible.builtin.include_tasks:
            file: tasks/reserved_ip.yml
            apply:
              tags: [reserved_ip]
          tags: [always, reserved_ip]

        - name: Include volume tests
          ansible.builtin.include_tasks:
            file: tasks/volume.yml
            apply:
              tags: [volume]
          tags: [always, volume]

        - name: Include instance tests
          ansible.builtin.include_tasks:
            file: tasks/instance.yml
            apply:
              tags: [instance]
          tags: [always, instance]

        - name: Include reserved IP assign tests
          ansible.builtin.include_tasks:
            file: tasks/reserved_ip_assign.yml
            apply:
              tags: [reserved_ip]
          tags: [always, reserved_ip]

        - name: Include volume attach tests
          ansible.builtin.include_tasks:
            file: tasks/volume_attach.yml
            apply:
              tags: [volume]
          tags: [always, volume]

        - name: Include object store tests
          ansible.builtin.include_tasks:
            file: tasks/objectstore.yml
            apply:
              tags: [objectstore]
          tags: [always, objectstore]

        - name: Include database tests
          ansible.builtin.include_tasks:
            file: tasks/database.yml
            apply:
              tags: [database]
          tags: [always, database]

        - name: Include Kubernetes core tests
          ansible.builtin.include_tasks:
            file: tasks/kubernetes.yml
            apply:
              tags: [kubernetes]
          tags: [always, kubernetes]

        - name: Include Kubernetes upgrade tests
          ansible.builtin.include_tasks:
            file: tasks/kubernetes_upgrade.yml
            apply:
              tags: [kubernetes, kubernetes_upgrade]
          tags: [kubernetes_upgrade]

        - name: Include Kubernetes node tests
          ansible.builtin.include_tasks:
            file: tasks/kubernetes_node.yml
            apply:
              tags: [kubernetes, kubernetes_node]
          tags: [kubernetes_node]

        - name: Include Kubernetes pool tests
          ansible.builtin.include_tasks:
            file: tasks/kubernetes_pool.yml
            apply:
              tags: [kubernetes, kubernetes_pool]
          tags: [kubernetes_pool]

        - name: Include SSH key tests
          ansible.builtin.include_tasks:
            file: tasks/sshkey.yml
            apply:
              tags: [sshkey]
          tags: [always, sshkey]

        - name: Include catalog info tests (diskimage + k8s versions + region + size + quota + volumetype)
          ansible.builtin.include_tasks:
            file: tasks/catalog.yml
            apply:
              tags: [catalog]
          tags: [always, catalog]

        - name: Include load balancer tests
          ansible.builtin.include_tasks:
            file: tasks/loadbalancer.yml
            apply:
              tags: [loadbalancer]
          tags: [always, loadbalancer]

        - name: Include info (list-all) tests
          ansible.builtin.include_tasks:
            file: tasks/info_all.yml
            apply:
              tags: [info]
          tags: [always, info]

        - name: All create/read/update tests passed
          ansible.builtin.debug:
            msg: "All resources created, read back, and verified. Proceeding to destroy phase."

      always:
        - name: Cleanup all test resources
          ansible.builtin.include_tasks:
            file: tasks/cleanup.yml
